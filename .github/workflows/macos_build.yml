# =============================================================================
# AstroCategorizer macOS Build Workflow
# =============================================================================
# Builds AstroCategorizer for macOS as native binaries for both architectures.
# Split into two jobs to handle PyQt5 single-arch limitations.
# =============================================================================

name: macOS Build

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ===========================
  # 1. Apple Silicon (ARM64)
  # ===========================
  build-macos-arm64:
    name: Build macOS App (Apple Silicon - ARM64)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Install DMG Tools
        run: brew install create-dmg

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name "AstroCategorizer" \
            --windowed \
            --onedir \
            --icon logo.ico \
            --add-data "logo.png:." \
            --add-data "logo.ico:." \
            --noconfirm \
            --clean \
            main.py
          
          echo ">>> App Bundle Size:"
          du -sh dist/AstroCategorizer.app || du -sh dist/AstroCategorizer

      - name: Ad-hoc Code Sign
        run: |
          APP_PATH="dist/AstroCategorizer"
          if [ -d "dist/AstroCategorizer.app" ]; then
            APP_PATH="dist/AstroCategorizer.app"
          else
            echo ">>> Creating .app wrapper..."
            mkdir -p "dist/AstroCategorizer.app/Contents/MacOS"
            mkdir -p "dist/AstroCategorizer.app/Contents/Resources"
            cp -R dist/AstroCategorizer/* "dist/AstroCategorizer.app/Contents/MacOS/"
            cp logo.ico "dist/AstroCategorizer.app/Contents/Resources/icon.icns" 2>/dev/null || true
            
            cat > "dist/AstroCategorizer.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>AstroCategorizer</string>
              <key>CFBundleIdentifier</key>
              <string>com.astrocategorizer.app</string>
              <key>CFBundleName</key>
              <string>AstroCategorizer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          PLIST
            APP_PATH="dist/AstroCategorizer.app"
          fi
          codesign --force --deep --sign - "$APP_PATH"
          xattr -cr "$APP_PATH"

      - name: Create DMG
        run: |
          mkdir -p installer_output
          VERSION=$(git describe --tags --always 2>/dev/null || echo "1.0.0")
          create-dmg \
            --volname "AstroCategorizer ARM64" \
            --volicon "logo.ico" \
            --window-pos 200 120 --window-size 600 400 --icon-size 100 \
            --icon "AstroCategorizer.app" 150 185 --app-drop-link 450 185 \
            "installer_output/AstroCategorizer_Setup_${VERSION}-ARM64.dmg" \
            "dist/AstroCategorizer.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AstroCategorizer-macOS-ARM64-DMG
          path: installer_output/*.dmg

  # ===========================
  # 2. Intel (x86_64)
  # ===========================
  build-macos-x64:
    name: Build macOS App (Intel - x86_64)
    runs-on: macos-15 # Intel runner (compatible with GitHub's latest updates)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Install DMG Tools
        run: brew install create-dmg

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name "AstroCategorizer" \
            --windowed \
            --onedir \
            --icon logo.ico \
            --add-data "logo.png:." \
            --add-data "logo.ico:." \
            --noconfirm \
            --clean \
            main.py
            
          echo ">>> App Bundle Size:"
          du -sh dist/AstroCategorizer.app || du -sh dist/AstroCategorizer

      - name: Ad-hoc Code Sign
        run: |
          if [ -d "dist/AstroCategorizer.app" ]; then
            APP_PATH="dist/AstroCategorizer.app"
          else
            mkdir -p "dist/AstroCategorizer.app/Contents/MacOS"
            cp -R dist/AstroCategorizer/* "dist/AstroCategorizer.app/Contents/MacOS/"
            cat > "dist/AstroCategorizer.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>AstroCategorizer</string>
              <key>CFBundleIdentifier</key>
              <string>com.astrocategorizer.app</string>
              <key>CFBundleName</key>
              <string>AstroCategorizer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          PLIST
            APP_PATH="dist/AstroCategorizer.app"
          fi
          codesign --force --deep --sign - "$APP_PATH"
          xattr -cr "$APP_PATH"

      - name: Create DMG
        run: |
          mkdir -p installer_output
          VERSION=$(git describe --tags --always 2>/dev/null || echo "1.0.0")
          create-dmg \
            --volname "AstroCategorizer x64" \
            --volicon "logo.ico" \
            --window-pos 200 120 --window-size 600 400 --icon-size 100 \
            --icon "AstroCategorizer.app" 150 185 --app-drop-link 450 185 \
            "installer_output/AstroCategorizer_Setup_${VERSION}-x64.dmg" \
            "dist/AstroCategorizer.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AstroCategorizer-macOS-x64-DMG
          path: installer_output/*.dmg
